<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Crypto Deck v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #121214;
            color: #e2e8f0;
            image-rendering: pixelated;
        }
        .pixel-border {
            border: 4px solid #fff;
            box-shadow: 4px 4px 0px #000;
        }
        .pixel-btn {
            border: 4px solid #fff;
            box-shadow: 3px 3px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .pixel-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #000;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="max-w-4xl w-full">
        <header class="text-center mb-8">
            <h1 class="text-xl md:text-3xl text-yellow-400 mb-2">RETRO CRYPTO DECK v3</h1>
            <p class="text-[10px] text-gray-400">Track any token, rename slots, and sync devices</p>
        </header>

        <section class="mb-8 bg-zinc-900 p-4 pixel-border">
            <h2 class="text-xs text-cyan-400 mb-4">SELECT SAVE SLOT:</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4" id="profile-slots"></div>
            
            <div class="border-t border-zinc-700 pt-4 mt-2">
                <h3 class="text-[10px] text-orange-400 mb-2">DECK OPTIONS & PASSCODE SYSTEMS</h3>
                <div class="flex flex-wrap gap-2">
                    <button onclick="renameActiveProfile()" id="rename-btn" class="hidden bg-purple-700 hover:bg-purple-600 text-white px-3 py-2 text-[9px] pixel-btn cursor-pointer">RENAME ACTIVE SLOT</button>
                    <button onclick="exportSaveCode()" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-2 text-[9px] pixel-btn cursor-pointer">GENERATE SAVE CODE</button>
                    <button onclick="importSaveCode()" class="bg-zinc-700 hover:bg-zinc-600 text-white px-3 py-2 text-[9px] pixel-btn cursor-pointer">LOAD SAVE CODE</button>
                </div>
            </div>
        </section>

        <main id="dashboard" class="hidden">
            <div class="bg-blue-900 p-6 mb-8 pixel-border text-center">
                <h2 class="text-xs text-blue-300 mb-2" id="deck-title">TOTAL DECK VALUE</h2>
                <div class="text-lg md:text-2xl text-green-400 mb-2" id="total-usd">$0.00 USD</div>
                <div class="text-sm md:text-lg text-yellow-300" id="total-thb">0.00 THB</div>
            </div>

            <section class="bg-zinc-900 p-4 mb-8 pixel-border">
                <h3 class="text-xs text-purple-400 mb-2">MINT NEW CARD</h3>
                <p class="text-[9px] text-gray-400 mb-4">Type the official CoinGecko ID (e.g., bitcoin, dogecoin, polkadot, solana, cardano)</p>
                <form id="add-holding-form" class="flex flex-col sm:flex-row gap-4 items-end">
                    <div class="flex-1 w-full">
                        <label class="block text-[10px] mb-2">TOKEN COINGECKO ID:</label>
                        <input type="text" id="coin-id" required placeholder="e.g., solana" class="w-full bg-black p-2 pixel-border text-xs text-white focus:outline-none lowercase">
                    </div>
                    <div class="flex-1 w-full">
                        <label class="block text-[10px] mb-2">AMOUNT:</label>
                        <input type="number" id="coin-amount" step="any" required placeholder="0.00" class="w-full bg-black p-2 pixel-border text-xs text-white focus:outline-none">
                    </div>
                    <button type="submit" class="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 text-xs pixel-btn cursor-pointer">MINT</button>
                </form>
            </section>

            <h3 class="text-xs text-yellow-400 mb-4">YOUR CARD DECK:</h3>
            <div id="card-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        let appData = {
            activeProfile: null,
            profiles: {
                slot_1: { name: "SLOT 1: MAIN", holdings: [] },
                slot_2: { name: "SLOT 2: ALTS", holdings: [] },
                slot_3: { name: "SLOT 3: YIELD", holdings: [] }
            }
        };

        // Migrate older versions gracefully or load existing v3 cache
        if (localStorage.getItem('retroCryptoDataV3')) {
            appData = JSON.parse(localStorage.getItem('retroCryptoDataV3'));
        } else if (localStorage.getItem('retroCryptoDataV2')) {
            appData = JSON.parse(localStorage.getItem('retroCryptoDataV2'));
        }

        let cryptoPrices = {};

        async function fetchPrices() {
            let idsToFetch = ['bitcoin', 'ethereum', 'dogecoin', 'polkadot']; 
            
            Object.values(appData.profiles).forEach(profile => {
                profile.holdings.forEach(holding => {
                    if (!idsToFetch.includes(holding.id)) {
                        idsToFetch.push(holding.id);
                    }
                });
            });

            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${idsToFetch.join(',')}&vs_currencies=usd,thb`);
                if (response.ok) {
                    cryptoPrices = await response.json();
                    updateDashboardUI();
                }
            } catch (error) {
                console.log("API tracking update throttle or offline.");
            }
        }

        function saveData() {
            localStorage.setItem('retroCryptoDataV3', JSON.stringify(appData));
        }

        function renderProfiles() {
            const container = document.getElementById('profile-slots');
            container.innerHTML = '';
            
            Object.keys(appData.profiles).forEach(slotKey => {
                const profile = appData.profiles[slotKey];
                const isActive = appData.activeProfile === slotKey;
                
                const slotDiv = document.createElement('div');
                slotDiv.className = `p-3 text-center cursor-pointer pixel-btn text-[10px] break-all ${isActive ? 'bg-cyan-700 border-yellow-400 text-white' : 'bg-zinc-800 hover:bg-zinc-700 text-gray-300'}`;
                slotDiv.innerText = profile.name;
                slotDiv.onclick = () => selectProfile(slotKey);
                
                container.appendChild(slotDiv);
            });
        }

        function selectProfile(slotKey) {
            appData.activeProfile = slotKey;
            saveData();
            renderProfiles();
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('rename-btn').classList.remove('hidden');
            updateDashboardUI();
        }

        // Feature: Rename Active Slot Customization
        window.renameActiveProfile = function() {
            if (!appData.activeProfile) return;
            
            const currentProfile = appData.profiles[appData.activeProfile];
            const newName = prompt("ENTER NEW NAME FOR THIS SAVE SLOT:", currentProfile.name);
            
            if (newName && newName.trim() !== "") {
                currentProfile.name = newName.trim().toUpperCase();
                saveData();
                renderProfiles();
                updateDashboardUI();
            }
        }

        function updateDashboardUI() {
            if (!appData.activeProfile) return;
            
            const currentProfile = appData.profiles[appData.activeProfile];
            document.getElementById('deck-title').innerText = `${currentProfile.name} TOTAL VALUE`;
            
            const cardGrid = document.getElementById('card-grid');
            cardGrid.innerHTML = '';
            
            let totalUSD = 0;
            let totalTHB = 0;

            currentProfile.holdings.forEach((holding, index) => {
                const prices = cryptoPrices[holding.id] || { usd: 0, thb: 0 };
                const holdingValueUSD = holding.amount * prices.usd;
                const holdingValueTHB = holding.amount * prices.thb;
                
                totalUSD += holdingValueUSD;
                totalTHB += holdingValueTHB;

                const card = document.createElement('div');
                card.className = "bg-zinc-800 p-4 pixel-border flex flex-col justify-between border-gray-600 relative";
                
                let cardIcon = '🪙';
                let cardColor = "text-purple-400";
                
                if (holding.id === 'bitcoin') { cardIcon = '🪙'; cardColor = "text-amber-500"; }
                else if (holding.id === 'ethereum') { cardIcon = '💎'; cardColor = "text-indigo-400"; }
                else if (holding.id === 'dogecoin') { cardIcon = '🐕'; cardColor = "text-yellow-500"; }
                else if (holding.id === 'polkadot') { cardIcon = '🔮'; cardColor = "text-pink-500"; }
                else if (holding.id === 'solana') { cardIcon = '☀️'; cardColor = "text-emerald-400"; }

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] ${cardColor} break-all">${holding.id.toUpperCase()}</span>
                            <button onclick="deleteCard(${index})" class="text-[9px] text-red-500 hover:text-red-400 cursor-pointer pl-2">[X]</button>
                        </div>
                        <div class="bg-black h-24 flex items-center justify-center pixel-border border-zinc-700 mb-4 text-2xl">
                            ${cardIcon}
                        </div>
                        <div class="text-[9px] text-gray-400 mb-1">QTY: <span class="text-white">${holding.amount.toLocaleString()}</span></div>
                    </div>
                    <div class="mt-4 pt-2 border-t border-zinc-700">
                        <div class="text-[9px] text-green-400">$${holdingValueUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="text-[9px] text-yellow-300">${holdingValueTHB.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} ฿</div>
                    </div>
                `;
                cardGrid.appendChild(card);
            });

            document.getElementById('total-usd').innerText = `$${totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} USD`;
            document.getElementById('total-thb').innerText = `${totalTHB.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} THB`;
        }

        document.getElementById('add-holding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!appData.activeProfile) return alert("Please select a save slot first!");

            const coinId = document.getElementById('coin-id').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('coin-amount').value);

            if (amount > 0 && coinId !== "") {
                const currentProfile = appData.profiles[appData.activeProfile];
                const existingIndex = currentProfile.holdings.findIndex(h => h.id === coinId);
                
                if (existingIndex > -1) {
                    currentProfile.holdings[existingIndex].amount += amount;
                } else {
                    currentProfile.holdings.push({ id: coinId, amount: amount });
                }

                saveData();
                fetchPrices();
                document.getElementById('coin-id').value = '';
                document.getElementById('coin-amount').value = '';
            }
        });

        window.deleteCard = function(index) {
            if(confirm("Discard this card from your deck?")) {
                appData.profiles[appData.activeProfile].holdings.splice(index, 1);
                saveData();
                updateDashboardUI();
            }
        }

        window.exportSaveCode = function() {
            const dataString = btoa(unescape(encodeURIComponent(JSON.stringify(appData))));
            const tempInput = document.createElement("input");
            document.body.appendChild(tempInput);
            tempInput.value = dataString;
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            alert("SAVE CODE COPIED TO CLIPBOARD!\n\nPaste it into a safe text note or use it to load your files on another machine.");
        }

        window.importSaveCode = function() {
            const code = prompt("PASTE YOUR SAVE CODE HERE:");
            if (code) {
                try {
                    const parsedData = JSON.parse(decodeURIComponent(escape(atob(code))));
                    if(parsedData.profiles) {
                        appData = parsedData;
                        saveData();
                        renderProfiles();
                        fetchPrices();
                        alert("SAVE DATA LOADED SUCCESSFULLY!");
                    }
                } catch (e) {
                    alert("INVALID SAVE CODE. Please verify you copied the entire text layout string.");
                }
            }
        }

        renderProfiles();
        fetchPrices();
        setInterval(fetchPrices, 30000);
    </script>
</body>
</html>
